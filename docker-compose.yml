version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: lunora-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lunora-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lunora-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/lunora
      - JWT_SECRET=superSecretKeyForTokenSigningChangeThisInProduction
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      - EMAIL_PROVIDER=mock
      - RAZORPAY_KEY_ID=rzp_test_mockKeyId123
      - RAZORPAY_KEY_SECRET=mockSecretKey456
      - CLOUDINARY_CLOUD_NAME=mock_cloud_name
      - CLOUDINARY_API_KEY=mock_api_key
      - CLOUDINARY_API_SECRET=mock_api_secret
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lunora-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=http://localhost:3000
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    container_name: lunora-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lunora-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:

networks:
  lunora-net:
    driver: bridge
