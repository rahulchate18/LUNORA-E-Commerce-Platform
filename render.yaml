services:
  - type: web
    name: lunora-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: '"LUNORA Premium Atelier" <orders@yourdomain.com>'
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
